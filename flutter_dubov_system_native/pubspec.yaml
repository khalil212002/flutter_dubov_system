name: flutter_dubov_system_native
description: "A new Dart FFI package project."
version: 0.0.1

environment:
  sdk: ^3.11.0

dependencies:
  code_assets: ^1.0.0
  hooks: ^1.0.0
  logging: ^1.3.0
  native_toolchain_c: ^0.17.4
  flutter_dubov_system_platform_interface:
  ffi: ^2.2.0
  native_assets_cli:

dev_dependencies:
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  test: ^1.28.0

flutter:
  plugin:
    platforms:
      windows:
        dartPluginClass: DubovSystemNative
      macos:
        dartPluginClass: DubovSystemNative
      linux:
        dartPluginClass: DubovSystemNative
      android:
        dartPluginClass: DubovSystemNative
      ios:
        dartPluginClass: DubovSystemNative
