name: flutter_dubov_system
description: High-performance Dubov Swiss system pairing engine for Flutter. FIDE-compliant chess tournament matchmaking for Web (WASM), Android, and Windows.
version: 1.0.2
homepage: https://github.com/khalil212002/flutter_dubov_system
repository: https://github.com/khalil212002/flutter_dubov_system/tree/master/flutter_dubov_system
topics:
  - chess
  - tournament
  - pairing
  - swiss-system
  - dubov

environment:
  sdk: ^3.11.0
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dubov_system_platform_interface: ^1.0.2
  flutter_dubov_system_web: ^1.0.2
  flutter_dubov_system_native: ^1.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      web:
        default_package: flutter_dubov_system_web
      windows:
        default_package: flutter_dubov_system_native
      android:
        default_package: flutter_dubov_system_native
      linux:
        default_package: flutter_dubov_system_native
      ios:
        default_package: flutter_dubov_system_native
      macos:
        default_package: flutter_dubov_system_native

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

